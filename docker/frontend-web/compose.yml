services:
  frontend-web:
    image: ${DOCKER_REGISTRY:-localhost:8082}/clinic/frontend-web:${FRONTEND_VERSION:-latest}
    container_name: clinic_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    depends_on:
      - backend
    networks:
      - clinic_net
