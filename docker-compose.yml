# IP do host (para containers acessarem MySQL local)
# No Linux: usar host.docker.internal ou o IP da docker0 (172.17.0.1)

services:

  # ─── Nexus Repository (Registry Docker privado) ───────────────────────────
  nexus:
    image: sonatype/nexus3:latest
    container_name: clinic_nexus
    restart: unless-stopped
    ports:
      - "8081:8081"   # UI do Nexus
      - "8082:8082"   # Docker registry (hosted)
    volumes:
      - /opt/nexus-data:/nexus-data
    environment:
      INSTALL4J_ADD_VM_PARAMS: "-Xms1g -Xmx2g -XX:MaxDirectMemorySize=2g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clinic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ─────────────────────────────────────────────────────
  backend:
    image: localhost:8082/clinic/backend:${BACKEND_VERSION:-latest}
    container_name: clinic_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - clinic_net

  # ─── Frontend Web (Next.js) ───────────────────────────────────────────────
  frontend-web:
    image: localhost:8082/clinic/frontend-web:${FRONTEND_VERSION:-latest}
    container_name: clinic_frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    depends_on:
      - backend
    networks:
      - clinic_net

networks:
  clinic_net:
    driver: bridge

volumes:
  redis_data:
